name: CD - Emergency Rollback (ECS)

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to rollback'
        required: true
        type: choice
        options: [all, api, web]
        default: all
      reason:
        description: 'Reason for rollback'
        required: true

permissions:
  contents: read
  deployments: write
  issues: write
  id-token: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  execute-rollback:
    name: Rollback — ${{ github.event.inputs.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create rollback deployment record
        id: create-deployment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Emergency rollback (${{ github.event.inputs.service }}): ${{ github.event.inputs.reason }}',
              auto_merge: false,
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Rollback api service
        id: rollback-api
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'api' }}
        run: |
          echo "🔙 Rolling back api — reason: ${{ github.event.inputs.reason }}"
          PREV=$(aws ecs list-task-definition-revisions \
            --family-prefix ephops-prod-api \
            --region us-east-1 \
            --sort DESCENDING \
            --query 'taskDefinitionArns[1]' \
            --output text)
          [ -z "$PREV" ] || [ "$PREV" = "None" ] && { echo "::error::No previous api task def"; exit 1; }
          aws ecs update-service --cluster ephops-prod-cluster --service ephops-prod-api-service \
            --task-definition "$PREV" --region us-east-1
          aws ecs wait services-stable --cluster ephops-prod-cluster \
            --services ephops-prod-api-service --region us-east-1
          echo "prev_task_def=${PREV}" >> $GITHUB_OUTPUT
          echo "::notice::API rolled back to $PREV"

      - name: Rollback web service
        id: rollback-web
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'web' }}
        run: |
          echo "🔙 Rolling back web — reason: ${{ github.event.inputs.reason }}"
          PREV=$(aws ecs list-task-definition-revisions \
            --family-prefix ephops-prod-web \
            --region us-east-1 \
            --sort DESCENDING \
            --query 'taskDefinitionArns[1]' \
            --output text)
          [ -z "$PREV" ] || [ "$PREV" = "None" ] && { echo "::error::No previous web task def"; exit 1; }
          aws ecs update-service --cluster ephops-prod-cluster --service ephops-prod-web-service \
            --task-definition "$PREV" --region us-east-1
          aws ecs wait services-stable --cluster ephops-prod-cluster \
            --services ephops-prod-web-service --region us-east-1
          echo "prev_task_def=${PREV}" >> $GITHUB_OUTPUT
          echo "::notice::Web rolled back to $PREV"

      - name: Verify health after rollback
        id: verify
        run: |
          if [[ "${{ github.event.inputs.service }}" == "all" || "${{ github.event.inputs.service }}" == "api" ]]; then
            echo "--- Verify API ---"
            for i in $(seq 1 10); do
              curl -sf "${{ secrets.PROD_API_URL }}/health" && break
              [ $i -lt 10 ] && sleep 5 || { echo "::warning::API health check failed after rollback"; exit 1; }
            done
          fi

          if [[ "${{ github.event.inputs.service }}" == "all" || "${{ github.event.inputs.service }}" == "web" ]]; then
            echo "--- Verify Web ---"
            for i in $(seq 1 10); do
              curl -sf "${{ secrets.PROD_WEB_URL }}/health" && break
              [ $i -lt 10 ] && sleep 5 || { echo "::warning::Web health check failed after rollback"; exit 1; }
            done
          fi

      - name: Update deployment status
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const success = '${{ steps.verify.outcome }}' === 'success';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: success ? 'success' : 'failure',
              description: success ? 'Rollback successful' : 'Rollback executed but health check failed',
              environment_url: '${{ secrets.PROD_WEB_URL }}',
            });

      - name: Rollback evidence summary
        if: always()
        run: |
          {
            echo "## Rollback Evidence"
            echo "- Service: ${{ github.event.inputs.service }}"
            echo "- Reason: ${{ github.event.inputs.reason }}"
            echo "- Triggered by: ${{ github.actor }}"
            echo "- API Task Def: ${{ steps.rollback-api.outputs.prev_task_def || 'skipped' }}"
            echo "- Web Task Def: ${{ steps.rollback-web.outputs.prev_task_def || 'skipped' }}"
            echo "- Health Verify: ${{ steps.verify.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `⚠️ **PRODUCTION ALERT**: Rollback failed!\n- Service: ${{ github.event.inputs.service }}\n- Reason: ${{ github.event.inputs.reason }}\n- Triggered by: @${{ github.actor }}`
            });
            core.setFailed('Rollback failed — manual intervention required');
