services:
  floci:
    image: hectorvent/floci:latest
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      FLOCI_STORAGE_MODE: hybrid
      FLOCI_SERVICES_DOCKER_NETWORK: myapp_default
  
  postgresql:
    image: postgres:18-alpine3.23
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ephops
    volumes:
      - ./data/postgresql:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ephops"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
    command:
      - /bin/sh
      - -c
      - |
        until ollama list >/dev/null 2>&1; do
          echo "Waiting for Ollama API..."
          sleep 2
        done
        ollama pull qwen3.5

  ephops-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ephops-backend
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      floci:
        condition: service_started
      ollama:
        condition: service_started
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/ephops
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://floci:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3.5
